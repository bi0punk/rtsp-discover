name: CI
on: [push, pull_request]
jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with: { enable-cache: true }
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dev
        run: uv pip install --system pytest ruff
      - name: Ruff check
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest -q
